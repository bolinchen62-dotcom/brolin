<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DeepSeek Agent</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --text: #e0e0e0;
  --text2: #a0a0b0;
  --accent: #4d6bff;
  --user-bg: #1a3a5c;
  --assistant-bg: #0d1b2a;
  --thinking-bg: #1a1a00;
  --code-bg: #0d1117;
  --border: #2a2a4a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header .title { font-size: 16px; font-weight: 600; }
.header-btns { display: flex; gap: 8px; }
.header-btns button {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}
.header-btns button.active { color: var(--accent); border-color: var(--accent); }
.chat-area { flex: 1; overflow-y: auto; padding: 12px; }
.msg { margin-bottom: 12px; max-width: 100%; }
.msg.user { display: flex; justify-content: flex-end; }
.msg.user .bubble {
  background: var(--user-bg);
  border-radius: 14px 14px 4px 14px;
  padding: 10px 14px;
  max-width: 85%;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.assistant .bubble {
  background: var(--assistant-bg);
  border: 1px solid var(--border);
  border-radius: 14px 14px 14px 4px;
  padding: 10px 14px;
  max-width: 95%;
}
.thinking-toggle {
  background: var(--thinking-bg);
  border: 1px solid #3a3a00;
  border-radius: 8px;
  padding: 8px 12px;
  margin-bottom: 8px;
  cursor: pointer;
  font-size: 12px;
  color: #b0b000;
  display: flex;
  align-items: center;
  gap: 6px;
}
.thinking-content {
  background: var(--thinking-bg);
  border: 1px solid #3a3a00;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 8px;
  font-size: 12px;
  color: #999900;
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
  display: none;
}
.thinking-content.show { display: block; }
pre { background: var(--code-bg); border-radius: 8px; padding: 10px; overflow-x: auto; font-size: 12px; margin: 8px 0; }
code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
.input-area {
  display: flex;
  padding: 8px 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  gap: 8px;
}
.input-area textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  resize: none;
  height: 44px;
  max-height: 120px;
  outline: none;
  font-family: inherit;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area button {
  background: var(--accent);
  border: none;
  color: white;
  width: 44px;
  height: 44px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
  flex-shrink: 0;
}
.input-area button:disabled { opacity: 0.5; }
.status { text-align: center; padding: 4px; font-size: 12px; color: var(--text2); }
.typing-dot { display: inline-flex; gap: 4px; padding: 4px 0; }
.typing-dot span { width: 6px; height: 6px; border-radius: 50%; background: var(--text2); animation: bounce 1.2s infinite; }
.typing-dot span:nth-child(2) { animation-delay: 0.2s; }
.typing-dot span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
.empty-state { text-align: center; color: var(--text2); padding: 60px 20px; }
.empty-state h2 { font-size: 20px; margin-bottom: 8px; }
.empty-state p { font-size: 13px; }
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal.show { display: flex; }
.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  width: 90%;
  max-width: 400px;
}
.modal-content h3 { margin-bottom: 12px; }
.modal-content input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 10px;
  outline: none;
}
.modal-content input:focus { border-color: var(--accent); }
.modal-content .hint { font-size: 11px; color: var(--text2); margin-bottom: 12px; }
.modal-content .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
.modal-content .btn-row button {
  padding: 8px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
}
.modal-content .btn-save { background: var(--accent); color: white; border-color: var(--accent); }
.modal-content .btn-cancel { background: transparent; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <span class="title">DeepSeek Agent</span>
  <div class="header-btns">
    <button id="modelBtn" class="active" onclick="toggleModel()">Reasoner</button>
    <button onclick="newChat()">+ New</button>
    <button onclick="showSettings()">Set</button>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty-state"><h2>DeepSeek Agent</h2><p>Reasoning · Streaming · Code</p></div>
</div>
<div class="status" id="statusBar"></div>

<div class="input-area">
  <textarea id="inputBox" rows="1" placeholder="Message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
  <button id="sendBtn" onclick="send()">Send</button>
</div>

<div class="modal" id="settingsModal">
  <div class="modal-content">
    <h3>API Settings</h3>
    <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key">
    <div class="hint">Get from platform.deepseek.com/api_keys</div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
let apiKey = localStorage.getItem('ds_api_key') || '';
let model = localStorage.getItem('ds_model') || 'deepseek-reasoner';
let messages = [];
let isStreaming = false;

document.addEventListener('DOMContentLoaded', () => {
  if (!apiKey) showSettings();
  updateModelBtn();
});

try { const s = localStorage.getItem('ds_chat'); if (s) { messages = JSON.parse(s); if (messages.length) renderAll(); } } catch(e){}

function toggleModel() {
  model = model === 'deepseek-reasoner' ? 'deepseek-chat' : 'deepseek-reasoner';
  localStorage.setItem('ds_model', model);
  updateModelBtn();
}
function updateModelBtn() {
  document.getElementById('modelBtn').textContent = model === 'deepseek-reasoner' ? 'Reasoner' : 'Chat';
}

function showSettings() {
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
function saveSettings() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('ds_api_key', apiKey);
  closeSettings();
  if (apiKey && window.AndroidBridge) window.AndroidBridge.saveApiKey(apiKey);
}

function newChat() {
  if (isStreaming) return;
  messages = [];
  localStorage.removeItem('ds_chat');
  document.getElementById('chatArea').innerHTML = '<div class="empty-state"><h2>DeepSeek Agent</h2><p>Reasoning · Streaming · Code</p></div>';
}

async function send() {
  if (isStreaming) return;
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey) { showSettings(); return; }
  input.value = ''; input.style.height = '44px';
  messages.push({ role: 'user', content: text });
  renderAll(); scrollBottom();
  const assistMsg = { role: 'assistant', content: '', reasoning_content: '' };
  messages.push(assistMsg);
  const msgIdx = messages.length - 1;
  renderAll(); scrollBottom();
  const typingEl = createTyping();
  document.getElementById('chatArea').appendChild(typingEl);
  scrollBottom();
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('statusBar').textContent = 'Thinking...';
  try { await streamChat(msgIdx, typingEl); }
  catch(e) { assistMsg.content = 'Error: ' + (e.message || 'network'); renderAll(); }
  finally {
    typingEl.remove();
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('statusBar').textContent = '';
    saveChat();
    input.focus();
  }
}

async function streamChat(msgIdx, typingEl) {
  const reqMsgs = messages.slice(0, -1).map(m => ({
    role: m.role, content: m.content
  }));
  const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ model, messages: reqMsgs, stream: true })
  });
  if (!resp.ok) {
    const err = await resp.text();
    messages[msgIdx].content = 'API error (' + resp.status + '): ' + err.substring(0, 200);
    renderAll(); return;
  }
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      const t = line.trim();
      if (!t || !t.startsWith('data: ')) continue;
      const d = t.slice(6);
      if (d === '[DONE]') continue;
      try {
        const chunk = JSON.parse(d);
        const delta = chunk.choices[0]?.delta;
        if (!delta) continue;
        if (delta.reasoning_content) messages[msgIdx].reasoning_content += delta.reasoning_content;
        if (delta.content) messages[msgIdx].content += delta.content;
        renderMsg(msgIdx); scrollBottom();
      } catch(e) {}
    }
  }
}

function renderAll() {
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  if (!messages.length) {
    area.innerHTML = '<div class="empty-state"><h2>DeepSeek Agent</h2><p>Reasoning · Streaming · Code</p></div>';
    return;
  }
  messages.forEach((m, i) => area.appendChild(createMsgEl(m, i)));
}
function renderMsg(idx) {
  const area = document.getElementById('chatArea');
  const old = area.querySelector('[data-mi="' + idx + '"]');
  const el = createMsgEl(messages[idx], idx);
  if (old) old.replaceWith(el); else area.appendChild(el);
}
function createMsgEl(msg, idx) {
  const w = document.createElement('div');
  w.className = 'msg ' + msg.role;
  w.setAttribute('data-mi', idx);
  const b = document.createElement('div');
  b.className = 'bubble';
  if (msg.role === 'assistant') {
    if (msg.reasoning_content) {
      const tg = document.createElement('div');
      tg.className = 'thinking-toggle';
      tg.innerHTML = 'Think <span>v</span>';
      const tc = document.createElement('div');
      tc.className = 'thinking-content';
      tc.textContent = msg.reasoning_content;
      tg.onclick = () => { tc.classList.toggle('show'); tg.querySelector('span').textContent = tc.classList.contains('show') ? '^' : 'v'; };
      b.appendChild(tg); b.appendChild(tc);
    }
    const cd = document.createElement('div');
    cd.innerHTML = msg.content ? renderMd(msg.content) : '<div class="typing-dot"><span></span><span></span><span></span></div>';
    b.appendChild(cd);
  } else { b.textContent = msg.content; }
  w.appendChild(b);
  return w;
}
function createTyping() {
  const e = document.createElement('div');
  e.className = 'msg assistant';
  e.innerHTML = '<div class="bubble"><div class="typing-dot"><span></span><span></span><span></span></div></div>';
  return e;
}
function renderMd(t) {
  let h = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_,lang,code) => '<pre><code>' + code.trim() + '</code></pre>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
  return h;
}
function scrollBottom() { setTimeout(() => { const a = document.getElementById('chatArea'); a.scrollTop = a.scrollHeight; }, 30); }
function saveChat() {
  try { localStorage.setItem('ds_chat', JSON.stringify(messages)); } catch(e) { messages = messages.slice(-50); localStorage.setItem('ds_chat', JSON.stringify(messages)); }
}
document.getElementById('inputBox').addEventListener('input', function() {
  this.style.height = '44px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
setTimeout(() => { if (window.AndroidBridge && !apiKey) window.AndroidBridge.getApiKey(); }, 500);
function setApiKeyFromNative(key) { if (key && !apiKey) { apiKey = key; localStorage.setItem('ds_api_key', key); } }
</script>
</body>
</html>
