<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DeepSeek Agent</title>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --card: #252540;
  --text: #e8e8f0;
  --text2: #8888a0;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --user-bg: linear-gradient(135deg, #6c5ce7, #4834d4);
  --assistant-bg: #1e1e35;
  --thinking-bg: #1a1a10;
  --code-bg: #0d1117;
  --border: #2d2d4a;
  --shadow: 0 2px 16px rgba(0,0,0,0.3);
  --radius: 16px;
  --radius-sm: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(26,26,46,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.app-icon {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #4834d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 2px 8px rgba(108,92,231,0.3);
}
.header .title { font-size: 17px; font-weight: 700; }
.header .subtitle { font-size: 11px; color: var(--text2); }
.header-btns { display: flex; gap: 6px; }
.btn-icon {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.btn-sm {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.btn-sm.active, .btn-sm.think-active { background: rgba(255,200,0,0.15); border-color: rgba(255,200,0,0.3); color: #ccaa00; }

.chat-area { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth; }
.chat-area::-webkit-scrollbar { width: 3px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg { margin-bottom: 16px; animation: msgIn 0.3s ease; }
@keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.msg.user { display: flex; justify-content: flex-end; }
.msg.user .bubble {
  background: var(--user-bg);
  color: white;
  border-radius: 18px 18px 4px 18px;
  padding: 12px 16px;
  max-width: 82%;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 14px;
  line-height: 1.55;
  box-shadow: 0 2px 12px rgba(108,92,231,0.25);
}

.msg.assistant .bubble {
  background: var(--assistant-bg);
  border: 1px solid var(--border);
  border-radius: 18px 18px 18px 4px;
  padding: 14px 16px;
  max-width: 95%;
  font-size: 14px;
  line-height: 1.65;
  box-shadow: var(--shadow);
}

.think-block {
  background: linear-gradient(135deg, #1a1a08, #141400);
  border: 1px solid rgba(200,180,0,0.2);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  overflow: hidden;
}
.think-header {
  padding: 10px 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px;
  color: #b0a000;
  font-weight: 600;
  user-select: none;
}
.think-body {
  padding: 0 14px; max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  font-size: 12px; color: #888800;
  line-height: 1.5; white-space: pre-wrap;
  border-top: 1px solid transparent;
}
.think-body.open { max-height: 400px; padding: 12px 14px; border-top-color: rgba(200,180,0,0.15); overflow-y: auto; }

pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  overflow-x: auto;
  font-size: 12px;
  margin: 10px 0;
}
code { font-family: 'JetBrains Mono','Fira Code',monospace; font-size: 12px; }
:not(pre) > code { background: var(--card); padding: 2px 6px; border-radius: 4px; font-size: 13px; }

.input-area {
  display: flex;
  align-items: flex-end;
  padding: 10px 14px 14px;
  background: rgba(26,26,46,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  gap: 10px;
}
.input-wrap {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  transition: border-color 0.2s;
  padding: 2px;
}
.input-wrap:focus-within { border-color: var(--accent); }
.input-wrap textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  padding: 10px 12px;
  font-size: 14px;
  resize: none;
  height: 42px;
  max-height: 130px;
  outline: none;
  font-family: inherit;
  line-height: 1.5;
}
.send-btn {
  background: linear-gradient(135deg, var(--accent), #4834d4);
  border: none;
  color: white;
  width: 44px; height: 44px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 2px 10px rgba(108,92,231,0.3);
  transition: all 0.2s;
}
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.4; transform: none; }

.status-bar { text-align: center; padding: 4px; font-size: 11px; color: var(--text2); flex-shrink: 0; background: var(--surface); }
.status-bar .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; background: #00ff88; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

.typing-dots { display: flex; gap: 4px; padding: 2px 0; }
.typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text2); animation: bounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity:0.3; } 30% { transform: translateY(-5px); opacity:1; } }

.empty-state { text-align: center; padding: 80px 30px; }
.empty-icon { width: 72px; height: 72px; border-radius: 22px; background: linear-gradient(135deg, var(--accent), #4834d4); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; box-shadow: 0 8px 32px rgba(108,92,231,0.25); }
.empty-state h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.empty-state p { font-size: 13px; color: var(--text2); max-width: 280px; margin: 0 auto; line-height: 1.6; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px; width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.4); }
.modal h3 { font-size: 18px; margin-bottom: 6px; }
.modal .desc { font-size: 12px; color: var(--text2); margin-bottom: 16px; }

.input-group { margin-bottom: 14px; }
.input-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.input-group input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: var(--radius-sm); font-size: 14px; outline: none; }
.input-group input:focus { border-color: var(--accent); }
.color-picker-row { display: flex; gap: 8px; flex-wrap: wrap; }
.color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.color-dot.highlight { border-color: white; transform: scale(1.15); box-shadow: 0 0 12px currentColor; }
.theme-preview { height: 60px; border-radius: var(--radius-sm); margin-top: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: rgba(255,255,255,0.6); }

.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.btn { padding: 9px 20px; border-radius: 20px; border: 1px solid var(--border); font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-secondary { background: transparent; color: var(--text2); }
.btn-danger { background: transparent; color: #ff6b6b; border-color: transparent; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="app-icon" id="appIcon">🤖</div>
    <div>
      <div class="title">DeepSeek Agent</div>
      <div class="subtitle" id="modelLabel">Reasoner · 深度推理</div>
    </div>
  </div>
  <div class="header-btns">
    <button class="btn-sm think-active" id="modelBtn" onclick="toggleModel()">🧠</button>
    <button class="btn-icon" onclick="newChat()">+</button>
    <button class="btn-icon" onclick="showSettings()">⚙</button>
  </div>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty-state">
    <div class="empty-icon">🤖</div>
    <h2>DeepSeek Agent</h2>
    <p>调用 DeepSeek API 原生智能体<br>深度推理 · 流式响应 · 代码高亮</p>
  </div>
</div>
<div class="status-bar" id="statusBar"></div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="inputBox" rows="1" placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
</div>

<div class="modal-overlay" id="settingsOverlay">
  <div class="modal">
    <h3>⚙ 设置</h3>
    <div class="desc">API Key · 主题 · 背景 · 图标</div>
    <div class="input-group"><label>API Key</label><input type="password" id="apiKeyInput" placeholder="sk-..."></div>
    <div class="input-group"><label>主题色</label><div class="color-picker-row" id="colorPicker"></div><div class="theme-preview" id="themePreview"></div></div>
    <div class="input-group"><label>背景图片 URL</label><input type="text" id="bgInput" placeholder="留空使用纯色深色背景"></div>
    <div class="input-group"><label>图标 Emoji</label><input type="text" id="iconInput" placeholder="🤖" maxlength="2"></div>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="resetAll()">重置</button>
      <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
let apiKey = localStorage.getItem('ds_api_key') || '';
let model = localStorage.getItem('ds_model') || 'deepseek-reasoner';
let accent = localStorage.getItem('ds_accent') || '#6c5ce7';
let bgImg = localStorage.getItem('ds_bg') || '';
let cIcon = localStorage.getItem('ds_icon') || '🤖';
let messages = [];
let streaming = false;
const PRESETS = ['#6c5ce7','#4d6bff','#00b894','#e17055','#f39c12','#e84393','#00cec9','#0984e3','#a29bfe'];

function init() {
  applyTheme(); updateModelBtn();
  document.getElementById('appIcon').textContent = cIcon;
  if (!apiKey) showSettings();
  try { const s = localStorage.getItem('ds_chat'); if (s) { messages = JSON.parse(s); if (messages.length) renderAll(); } } catch(e) {}
}
document.addEventListener('DOMContentLoaded', init);

function darken(c,a) { let n=parseInt(c.slice(1),16); let r=Math.max(0,(n>>16)+a), g=Math.max(0,((n>>8)&0xff)+a), b=Math.max(0,(n&0xff)+a); return '#'+((1<<24|r<<16|g<<8|b).toString(16).slice(1)); }

function applyTheme() {
  const s = document.documentElement.style;
  s.setProperty('--accent', accent);
  s.setProperty('--user-bg', `linear-gradient(135deg, ${accent}, ${darken(accent,-30)})`);
  s.setProperty('--bg', bgImg ? `#0f0f1a url(${bgImg}) center/cover fixed` : '#0f0f1a');
  document.getElementById('appIcon').textContent = cIcon;
  document.getElementById('themePreview').style.background = bgImg ? `url(${bgImg}) center/cover` : `linear-gradient(135deg,${accent},${darken(accent,-30)})`;
}

function toggleModel() {
  model = model === 'deepseek-reasoner' ? 'deepseek-chat' : 'deepseek-reasoner';
  localStorage.setItem('ds_model', model);
  updateModelBtn();
}
function updateModelBtn() {
  const b = document.getElementById('modelBtn');
  const l = document.getElementById('modelLabel');
  if (model === 'deepseek-reasoner') { b.textContent='🧠'; b.style.background='rgba(255,200,0,0.15)'; l.textContent='Reasoner · 深度推理'; }
  else { b.textContent='💬'; b.style.background='rgba(108,92,231,0.15)'; l.textContent='Chat · 快速对话'; }
}

function showSettings() {
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('bgInput').value = bgImg;
  document.getElementById('iconInput').value = cIcon;
  buildPicker();
  document.getElementById('settingsOverlay').classList.add('show');
}
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('show'); }
function buildPicker() {
  const p = document.getElementById('colorPicker');
  p.innerHTML = '';
  PRESETS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (c === accent ? ' highlight' : '');
    d.style.backgroundColor = c;
    d.onclick = () => { accent = c; buildPicker(); applyTheme(); };
    p.appendChild(d);
  });
}
function saveSettings() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  bgImg = document.getElementById('bgInput').value.trim();
  cIcon = document.getElementById('iconInput').value.trim() || '🤖';
  localStorage.setItem('ds_api_key', apiKey);
  localStorage.setItem('ds_bg', bgImg);
  localStorage.setItem('ds_icon', cIcon);
  localStorage.setItem('ds_accent', accent);
  applyTheme();
  closeSettings();
  if (apiKey && window.AndroidBridge) window.AndroidBridge.saveApiKey(apiKey);
}
function resetAll() {
  localStorage.clear();
  apiKey=''; model='deepseek-reasoner'; accent='#6c5ce7'; bgImg=''; cIcon='🤖'; messages=[];
  applyTheme(); updateModelBtn(); renderAll(); closeSettings(); showSettings();
}

function newChat() { if(streaming)return; messages=[]; localStorage.removeItem('ds_chat'); document.getElementById('chatArea').innerHTML=`<div class="empty-state"><div class="empty-icon">${cIcon}</div><h2>DeepSeek Agent</h2><p>调用 DeepSeek API 原生智能体<br>深度推理 · 流式响应 · 代码高亮</p></div>`; }

async function send() {
  if(streaming)return;
  const inp=document.getElementById('inputBox');
  const txt=inp.value.trim();
  if(!txt)return;
  if(!apiKey){showSettings();return;}
  inp.value='';inp.style.height='42px';
  messages.push({role:'user',content:txt});
  renderAll();scrollBottom();
  const am={role:'assistant',content:'',reasoning_content:''};
  messages.push(am);const mi=messages.length-1;
  renderAll();scrollBottom();
  const te=createTyping();document.getElementById('chatArea').appendChild(te);scrollBottom();
  streaming=true;
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('statusBar').innerHTML='<span class="dot"></span>思考中...';
  try{await streamChat(mi,te);}catch(e){am.content='❌ '+(e.message||'网络错误');renderAll();}
  finally{te.remove();streaming=false;document.getElementById('sendBtn').disabled=false;document.getElementById('statusBar').innerHTML='';saveChat();inp.focus();}
}

async function streamChat(mi,te) {
  const rm=messages.slice(0,-1).map(m=>({role:m.role,content:m.content}));
  const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify({model,messages:rm,stream:true})
  });
  if(!resp.ok){const e=await resp.text();messages[mi].content='❌ API '+resp.status+': '+e.substring(0,200);renderAll();return;}
  const reader=resp.body.getReader();const dec=new TextDecoder();let buf='';
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n');buf=lines.pop()||'';
    for(const l of lines){
      const t=l.trim();
      if(!t||!t.startsWith('data: '))continue;
      const d=t.slice(6);if(d==='[DONE]')continue;
      try{const c=JSON.parse(d);const delta=c.choices[0]?.delta;if(!delta)continue;if(delta.reasoning_content)messages[mi].reasoning_content+=delta.reasoning_content;if(delta.content)messages[mi].content+=delta.content;renderMsg(mi);scrollBottom();}catch(_){}
    }
  }
}

function renderAll() {
  const area=document.getElementById('chatArea');
  area.innerHTML='';
  if(!messages.length){area.innerHTML=`<div class="empty-state"><div class="empty-icon">${cIcon}</div><h2>DeepSeek Agent</h2><p>调用 DeepSeek API 原生智能体<br>深度推理 · 流式响应 · 代码高亮</p></div>`;return;}
  messages.forEach((m,i)=>area.appendChild(createMsgEl(m,i)));
}
function renderMsg(idx) {
  const area=document.getElementById('chatArea');
  const old=area.querySelector('[data-mi="'+idx+'"]');
  const el=createMsgEl(messages[idx],idx);
  if(old)old.replaceWith(el);else area.appendChild(el);
}
function createMsgEl(msg,idx) {
  const w=document.createElement('div');
  w.className='msg '+msg.role;w.setAttribute('data-mi',idx);
  const b=document.createElement('div');b.className='bubble';
  if(msg.role==='assistant'){
    if(msg.reasoning_content){
      const tb=document.createElement('div');tb.className='think-block';
      const th=document.createElement('div');th.className='think-header';th.innerHTML='💭 思考过程 <span style="font-size:10px">▾</span>';
      const tbd=document.createElement('div');tbd.className='think-body';tbd.textContent=msg.reasoning_content;
      th.onclick=()=>{const open=tbd.classList.toggle('open');th.querySelector('span').textContent=open?'▴':'▾';};
      tb.appendChild(th);tb.appendChild(tbd);b.appendChild(tb);
    }
    const cd=document.createElement('div');cd.innerHTML=msg.content?renderMd(msg.content):'<div class="typing-dots"><span></span><span></span><span></span></div>';
    b.appendChild(cd);
  }else{b.textContent=msg.content;}
  w.appendChild(b);return w;
}
function createTyping() {const e=document.createElement('div');e.className='msg assistant';e.innerHTML='<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';return e;}
function renderMd(t){let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre data-lang="${l||'code'}"><code>${c.trim()}</code></pre>`);h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*([^*]+)\*/g,'<em>$1</em>');h=h.replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');return h;}
function scrollBottom(){setTimeout(()=>{const a=document.getElementById('chatArea');a.scrollTop=a.scrollHeight;},30);}
function saveChat(){try{localStorage.setItem('ds_chat',JSON.stringify(messages));}catch(e){messages=messages.slice(-50);localStorage.setItem('ds_chat',JSON.stringify(messages));}}
document.getElementById('inputBox').addEventListener('input',function(){this.style.height='42px';this.style.height=Math.min(this.scrollHeight,130)+'px';});
setTimeout(()=>{if(window.AndroidBridge&&!apiKey){const k=window.AndroidBridge.getApiKey();if(k){apiKey=k;localStorage.setItem('ds_api_key',k);}}},500);
</script>
</body>
</html>
